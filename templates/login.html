{% extends 'base.html' %}
{% block content %}
<section class="card">
  <h2>Login</h2>
  <form method="post">
    <label>Username</label>
    <input name="username" required>
    <label>Password</label>
    <input name="password" type="password" required>
    <button type="submit">Login</button>
  </form>
  <p class="hint">Default admin: admin / admin123</p>
</section>
{% endblock %}
